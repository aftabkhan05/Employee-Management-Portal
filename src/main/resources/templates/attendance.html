<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{base::layout(~{::section})}">
<head>
    <meta charset="UTF-8">
    <title>Attendance</title>
</head>
<body>
<section>

    <div class="row mt-3">
        <div class="col-md-12">
            <div class="card" style="border-radius: 12px; border: none;
                                     box-shadow: 0 4px 15px rgba(0,0,0,0.1);">
                <div class="card-body">

                    <!-- Header -->
                    <div class="d-flex justify-content-between align-items-center mb-3">
                        <h5 style="color: #2c3e50; font-weight: bold;">
                            <i class="fas fa-calendar-check" style="color: #3498db;"></i>
                            Mark Attendance —
                            <span style="color: #3498db;" th:text="${today}"></span>
                        </h5>
                        <a th:href="@{/attendance-report}"
                           style="background-color: #2ecc71; color: white;
                                  padding: 8px 16px; border-radius: 8px;
                                  text-decoration: none; font-weight: bold;">
                            <i class="fas fa-chart-bar"></i> View Report
                        </a>
                    </div>

                    <hr>

                    <!--  Attendance Table -->
                    <table class="table">
                        <thead>
                        <tr style="background-color: #2c3e50; color: white;">
                            <th>S.No</th>
                            <th>Employee Name</th>
                            <th>Department</th>
                            <th>Designation</th>
                            <th>Mark Attendance</th>
                        </tr>
                        </thead>
                        <tbody>
                        <tr th:each="emp, i : ${allEmployee}">
                            <td th:text="${i.count}"></td>
                            <td th:text="${emp.employeeName}"></td>
                            <td th:text="${emp.department}"></td>
                            <td th:text="${emp.designation}"></td>
                            <td>
                                <form th:action="@{/save-attendance}" method="post"
                                      style="display: flex; gap: 8px;">
                                    <input type="hidden" name="employeeId"
                                           th:value="${emp.id}">

                                    <!--  Present Button -->
                                    <button type="submit" name="status" value="PRESENT"
                                            style="background-color: #2ecc71; color: white;
                                                       border: none; padding: 5px 12px;
                                                       border-radius: 6px; cursor: pointer;
                                                       font-weight: bold;">
                                        ✅ Present
                                    </button>

                                    <!--  Absent Button -->
                                    <button type="submit" name="status" value="ABSENT"
                                            style="background-color: #e74c3c; color: white;
                                                       border: none; padding: 5px 12px;
                                                       border-radius: 6px; cursor: pointer;
                                                       font-weight: bold;">
                                        ❌ Absent
                                    </button>

                                    <!--  Half Day Button -->
                                    <button type="submit" name="status" value="HALF_DAY"
                                            style="background-color: #f6c23e; color: white;
                                                       border: none; padding: 5px 12px;
                                                       border-radius: 6px; cursor: pointer;
                                                       font-weight: bold;">
                                        🕐 Half Day
                                    </button>

                                    <!--  Leave Button -->
                                    <button type="submit" name="status" value="LEAVE"
                                            style="background-color: #9b59b6; color: white;
                                                       border: none; padding: 5px 12px;
                                                       border-radius: 6px; cursor: pointer;
                                                       font-weight: bold;">
                                        📅 Leave
                                    </button>
                                </form>
                            </td>
                        </tr>
                        </tbody>
                    </table>

                    <!--  Today's Marked Attendance -->
                    <h6 style="color: #2c3e50; font-weight: bold; margin-top: 20px;">
                        <i class="fas fa-check-circle" style="color: #2ecc71;"></i>
                        Today's Marked Attendance
                    </h6>
                    <hr>

                    <table class="table table-bordered">
                        <thead>
                        <tr style="background-color: #3498db; color: white;">
                            <th>S.No</th>
                            <th>Name</th>
                            <th>Department</th>
                            <th>Status</th>
                            <th>Date</th>
                        </tr>
                        </thead>
                        <tbody>
                        <tr th:each="att, i : ${todayAttendance}">
                            <td th:text="${i.count}"></td>
                            <td th:text="${att.employeeName}"></td>
                            <td th:text="${att.department}"></td>
                            <td>
                                <!-- Color badge per status -->
                                <span th:if="${att.status == 'PRESENT'}"
                                      style="background-color: #2ecc71; color: white;
                                                 padding: 4px 10px; border-radius: 20px;
                                                 font-size: 12px; font-weight: bold;">
                                        ✅ Present
                                    </span>
                                <span th:if="${att.status == 'ABSENT'}"
                                      style="background-color: #e74c3c; color: white;
                                                 padding: 4px 10px; border-radius: 20px;
                                                 font-size: 12px; font-weight: bold;">
                                        ❌ Absent
                                    </span>
                                <span th:if="${att.status == 'HALF_DAY'}"
                                      style="background-color: #f6c23e; color: white;
                                                 padding: 4px 10px; border-radius: 20px;
                                                 font-size: 12px; font-weight: bold;">
                                        🕐 Half Day
                                    </span>
                                <span th:if="${att.status == 'LEAVE'}"
                                      style="background-color: #9b59b6; color: white;
                                                 padding: 4px 10px; border-radius: 20px;
                                                 font-size: 12px; font-weight: bold;">
                                        📅 Leave
                                    </span>
                            </td>
                            <td th:text="${att.attendanceDate}"></td>
                        </tr>

                        <tr th:if="${#lists.isEmpty(todayAttendance)}">
                            <td colspan="5" class="text-center text-muted">
                                No Attendance Marked Yet Today
                            </td>
                        </tr>
                        </tbody>
                    </table>

                </div>
            </div>
        </div>
    </div>

</section>
</body>
</html>
