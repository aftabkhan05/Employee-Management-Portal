<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Login</title>

    <!-- ✅ Correct favicon path -->
    <link rel="icon" th:href="@{/img/emp-login.png}">

    <!-- ✅ Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body {
            background: linear-gradient(135deg, #667eea, #764ba2);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', sans-serif;
            margin: 0;
        }

        .login-card {
            width: 100%;
            max-width: 380px;
            padding: 25px;
            border-radius: 20px;
            background: rgba(255, 255, 255, 0.97);
            box-shadow: 0 15px 40px rgba(0,0,0,0.25);
        }

        .logo {
            height: 55px;
        }

        .form-group {
            position: relative;
            margin-bottom: 20px;
        }

        .form-control {
            border-radius: 12px;
            padding: 14px 12px;
        }

        .form-group label {
            position: absolute;
            top: 50%;
            left: 12px;
            transform: translateY(-50%);
            background: white;
            padding: 0 5px;
            color: #777;
            transition: 0.3s;
            pointer-events: none;
        }

        .form-control:focus + label,
        .form-control:not(:placeholder-shown) + label {
            top: -8px;
            font-size: 12px;
            color: #667eea;
        }

        .password-wrapper {
            position: relative;
        }

        .toggle-password {
            position: absolute;
            top: 50%;
            right: 12px;
            transform: translateY(-50%);
            cursor: pointer;
            color: #666;
        }

        .btn-login {
            width: 100%;
            border-radius: 30px;
            padding: 12px;
            font-weight: 600;
        }
    </style>
</head>

<body>

<div class="login-card text-center">
    <img th:src="@{/img/emp-login.png}" class="logo" alt="logo">
    <h3 class="mt-2">Welcome Back</h3>
    <p class="text-muted">Login to continue</p>

    <!-- ✅ Alert (will now close properly) -->
    <div class="alert alert-warning alert-dismissible fade show" role="alert" th:if="${error}">
        UserName and Password is Invalid, try again!
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>

    <!-- ⚠️ (Still using your flow, but recommend POST /login later) -->
    <form th:action="@{/home}" method="get">

        <div class="form-group">
            <input type="text" name="username" class="form-control" placeholder=" " required>
            <label>Employee ID</label>
        </div>

        <div class="form-group password-wrapper">
            <input type="password" name="password" id="password" class="form-control" placeholder=" " required>
            <label>Password</label>
            <i class="fas fa-eye toggle-password" onclick="togglePassword()"></i>
        </div>

        <button type="submit" class="btn btn-primary btn-login">
            Login
        </button>

        <div class="mt-3">
            <a th:href="@{/forgot-password}">Forgot Password?</a>
        </div>

        <div style="font-size: 25px; cursor: pointer;" class="container text-center mb-3">
            <i style="color: blue;" class="fa-brands fa-facebook"></i>
            <i style="color: red;" class="fa-brands fa-google"></i>
            <i  class="fa-brands fa-github"></i>
            <i style="color: red;" class="fa-brands fa-apple"></i>
            <i style="color: #FF00BF;" class="fa-brands fa-instagram"></i>
        </div>

    </form>
</div>


</div>
</div>
</div>
</body>

<!-- ✅ REQUIRED Bootstrap JS (FIXES YOUR ISSUE) -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<script>
    function togglePassword() {
        const password = document.getElementById("password");
        const icon = document.querySelector(".toggle-password");

        if (password.type === "password") {
            password.type = "text";
            icon.classList.replace("fa-eye", "fa-eye-slash");
        } else {
            password.type = "password";
            icon.classList.replace("fa-eye-slash", "fa-eye");
        }
    }
</script>

</body>
</html>
