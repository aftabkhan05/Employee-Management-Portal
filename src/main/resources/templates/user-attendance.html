<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{user-base::layout(~{::section})}">
<head>
    <meta charset="UTF-8">
    <title>My Attendance</title>
</head>
<body>
<section>

    <div class="row mt-3">
        <div class="col-md-10 offset-md-1">
            <div class="card" style="border-radius: 12px; border: none;
                                     box-shadow: 0 4px 15px rgba(0,0,0,0.1);">
                <div class="card-body">

                    <!-- ✅ Header -->
                    <div class="d-flex justify-content-between
                                align-items-center mb-3">
                        <h5 style="color: #2c3e50; font-weight: bold;">
                            <i class="fas fa-calendar-check"
                               style="color: #f39c12;"></i>
                            My Attendance
                        </h5>
                    </div>
                    <hr>

                    <!-- ✅ Month Filter -->
                    <form th:action="@{/user-attendance}" method="get"
                          class="d-flex flex-wrap gap-2 mb-4
                                 align-items-center">
                        <select name="month" class="form-control"
                                style="width: 150px;">
                            <option value="1"
                                    th:selected="${month == 1}">
                                January
                            </option>
                            <option value="2"
                                    th:selected="${month == 2}">
                                February
                            </option>
                            <option value="3"
                                    th:selected="${month == 3}">
                                March
                            </option>
                            <option value="4"
                                    th:selected="${month == 4}">
                                April
                            </option>
                            <option value="5"
                                    th:selected="${month == 5}">
                                May
                            </option>
                            <option value="6"
                                    th:selected="${month == 6}">
                                June
                            </option>
                            <option value="7"
                                    th:selected="${month == 7}">
                                July
                            </option>
                            <option value="8"
                                    th:selected="${month == 8}">
                                August
                            </option>
                            <option value="9"
                                    th:selected="${month == 9}">
                                September
                            </option>
                            <option value="10"
                                    th:selected="${month == 10}">
                                October
                            </option>
                            <option value="11"
                                    th:selected="${month == 11}">
                                November
                            </option>
                            <option value="12"
                                    th:selected="${month == 12}">
                                December
                            </option>
                        </select>

                        <input type="number" name="year"
                               class="form-control"
                               style="width: 100px;"
                               th:value="${year}">

                        <button type="submit"
                                style="background-color: #2c3e50;
                                       color: white; border: none;
                                       padding: 8px 16px;
                                       border-radius: 8px;
                                       cursor: pointer;">
                            <i class="fas fa-search"></i> Filter
                        </button>
                    </form>

                    <!-- ✅ Summary Cards -->
                    <div class="row mb-4">
                        <div class="col-6 col-md-3 mb-2">
                            <div style="background-color: #2ecc71;
                                        color: white; padding: 15px;
                                        border-radius: 10px;
                                        text-align: center;">
                                <h3 th:text="${present}">0</h3>
                                <b>Present</b>
                            </div>
                        </div>
                        <div class="col-6 col-md-3 mb-2">
                            <div style="background-color: #e74c3c;
                                        color: white; padding: 15px;
                                        border-radius: 10px;
                                        text-align: center;">
                                <h3 th:text="${absent}">0</h3>
                                <b>Absent</b>
                            </div>
                        </div>
                        <div class="col-6 col-md-3 mb-2">
                            <div style="background-color: #f6c23e;
                                        color: white; padding: 15px;
                                        border-radius: 10px;
                                        text-align: center;">
                                <h3 th:text="${halfDay}">0</h3>
                                <b>Half Day</b>
                            </div>
                        </div>
                        <div class="col-6 col-md-3 mb-2">
                            <div style="background-color: #9b59b6;
                                        color: white; padding: 15px;
                                        border-radius: 10px;
                                        text-align: center;">
                                <h3 th:text="${leave}">0</h3>
                                <b>Leave</b>
                            </div>
                        </div>
                    </div>

                    <!-- ✅ Attendance Table -->
                    <table class="table table-bordered">
                        <thead>
                        <tr style="background-color: #2c3e50;
                                       color: white;">
                            <th>S.No</th>
                            <th>Date</th>
                            <th>Day</th>
                            <th>Status</th>
                        </tr>
                        </thead>
                        <tbody>
                        <tr th:each="att, i : ${myAttendance}">
                            <td th:text="${i.count}"></td>
                            <td th:text="${att.attendanceDate}"></td>
                            <td th:text="${att.attendanceDate.dayOfWeek}">
                            </td>
                            <td>
                                    <span th:if="${att.status == 'PRESENT'}"
                                          style="background-color: #2ecc71;
                                                 color: white;
                                                 padding: 4px 12px;
                                                 border-radius: 20px;
                                                 font-size: 12px;
                                                 font-weight: bold;">
                                        ✅ Present
                                    </span>
                                <span th:if="${att.status == 'ABSENT'}"
                                      style="background-color: #e74c3c;
                                                 color: white;
                                                 padding: 4px 12px;
                                                 border-radius: 20px;
                                                 font-size: 12px;
                                                 font-weight: bold;">
                                        ❌ Absent
                                    </span>
                                <span th:if="${att.status == 'HALF_DAY'}"
                                      style="background-color: #f6c23e;
                                                 color: white;
                                                 padding: 4px 12px;
                                                 border-radius: 20px;
                                                 font-size: 12px;
                                                 font-weight: bold;">
                                        🕐 Half Day
                                    </span>
                                <span th:if="${att.status == 'LEAVE'}"
                                      style="background-color: #9b59b6;
                                                 color: white;
                                                 padding: 4px 12px;
                                                 border-radius: 20px;
                                                 font-size: 12px;
                                                 font-weight: bold;">
                                        📅 Leave
                                    </span>
                            </td>
                        </tr>

                        <!-- No Records -->
                        <tr th:if="${#lists.isEmpty(myAttendance)}">
                            <td colspan="4"
                                class="text-center text-muted"
                                style="padding: 20px;">
                                <i class="fas fa-calendar-times"
                                   style="font-size: 30px;
                                              color: #bdc3c7;"></i>
                                <p>No Attendance Records Found
                                    for This Month</p>
                            </td>
                        </tr>
                        </tbody>
                    </table>

                </div>
            </div>
        </div>
    </div>

</section>
</body>
</html>
