     <h3> <a class="navbar-brand" th:href="@{/user-dashboard}"> Employee Management Portal</a></h3>

        <div class="dropdown" style="position: relative; display: inline-block;">

                 th:src="@{'/img/' + ${session.profileImage}}"
                 class="me-2 dropdown-toggle"
                 data-bs-toggle="dropdown"
                 style="width: 38px; height: 38px; cursor: pointer; border-radius: 50%; object-fit: cover; border: 2px solid white;">

            <div class="dropdown-menu dropdown-menu-end p-0">

                <div style="padding: 12px 15px; border-bottom: 1px solid #f0f0f0;">
                    <i class="fas fa-user"></i>
                    <span th:text="${session.name}">Name</span>
                </div>

                <div style="padding: 12px 15px; border-bottom: 1px solid #f0f0f0;">
                    <i class="fas fa-laptop-code"></i>
                    <span th:text="${session.desg}">Designation</span>
                </div>

                <a th:href="@{/login}" class="dropdown-item">
                    <i class="fas fa-sign-out-alt"></i> Logout
                </a>

            </div>
        </div>


    </form>
  </div>
