<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{user-base::layout(~{::section})}">
<head>
    <meta charset="UTF-8">
    <title>Chat with Admin</title>
</head>
<body>
<section>

    <div class="row mt-3">
        <div class="col-md-8 offset-md-2">
            <div class="card" style="border-radius: 12px; border: none;
                                     box-shadow: 0 4px 15px rgba(0,0,0,0.1);">

                <!-- ✅ Chat Header -->
                <div style="background-color: #16a085; padding: 15px 20px;
                            border-radius: 12px 12px 0 0;
                            display: flex; align-items: center; gap: 12px;">
                    <i class="fas fa-user-shield" style="color: white; font-size: 20px;"></i>
                    <div>
                        <b style="color: white;" th:text="${adminName}">Admin</b>
                        <div style="color: rgba(255,255,255,0.8); font-size: 12px;">
                            HR Admin
                        </div>
                    </div>
                </div>

                <!-- ✅ Chat Messages -->
                <div id="chatBox"
                     style="height: 400px; overflow-y: auto;
                            padding: 20px; background-color: #f8f9fa;">

                    <div th:each="chat : ${chats}">

                        <!-- User Message (Right Side) -->
                        <div th:if="${chat.senderRole == 'USER'}"
                             style="display: flex; justify-content: flex-end; margin-bottom: 12px;">
                            <div style="background-color: #16a085; color: white;
                                        padding: 10px 15px; border-radius: 15px 15px 0 15px;
                                        max-width: 60%; font-size: 14px;">
                                <div th:text="${chat.message}">Message</div>
                                <div style="font-size: 10px; opacity: 0.7; margin-top: 4px; text-align: right;"
                                     th:text="${chat.sentAt}">Time</div>
                            </div>
                        </div>

                        <!-- Admin Message (Left Side) -->
                        <div th:if="${chat.senderRole == 'ADMIN'}"
                             style="display: flex; justify-content: flex-start; margin-bottom: 12px;">
                            <div style="background-color: white; color: #2c3e50;
                                        padding: 10px 15px; border-radius: 15px 15px 15px 0;
                                        max-width: 60%; font-size: 14px;
                                        box-shadow: 0 2px 5px rgba(0,0,0,0.1);">
                                <div th:text="${chat.message}">Message</div>
                                <div style="font-size: 10px; color: #95a5a6; margin-top: 4px;"
                                     th:text="${chat.sentAt}">Time</div>
                            </div>
                        </div>

                    </div>

                    <!-- No Messages -->
                    <div th:if="${#lists.isEmpty(chats)}"
                         style="text-align: center; color: #95a5a6; margin-top: 150px;">
                        <i class="fas fa-comments" style="font-size: 40px;"></i>
                        <p>No messages yet. Start the conversation!</p>
                    </div>

                </div>

                <!-- ✅ Message Input -->
                <div style="padding: 15px; border-top: 1px solid #ecf0f1;
                            background-color: white; border-radius: 0 0 12px 12px;">
                    <form th:action="@{/user-send-message}" method="post"
                          style="display: flex; gap: 10px;">
                        <input type="hidden" name="receiverId" th:value="${adminId}">
                        <input type="text" name="message"
                               placeholder="Type a message..."
                               required
                               style="flex: 1; border: 1px solid #ddd;
                                      border-radius: 25px; padding: 10px 18px;
                                      outline: none; font-size: 14px;">
                        <button type="submit"
                                style="background-color: #16a085; color: white;
                                       border: none; border-radius: 25px;
                                       padding: 10px 20px; cursor: pointer;
                                       font-weight: bold;">
                            <i class="fas fa-paper-plane"></i> Send
                        </button>
                    </form>
                </div>

            </div>
        </div>
    </div>

    <!-- ✅ Auto Scroll to Bottom -->
    <script>
        var chatBox = document.getElementById('chatBox');
        chatBox.scrollTop = chatBox.scrollHeight;
    </script>

    <!-- ✅ Auto Refresh Every 5 Seconds -->
    <script>
        setInterval(function() {
            location.reload();
        }, 5000);
    </script>

</section>
</body>
</html>
