<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{user-base::layout(~{::section})}">
<head>
    <meta charset="UTF-8">
    <title>My Payroll</title>
</head>
<body>
<section>
    <div class="row mt-3">
        <div class="col-md-10 offset-md-1">
            <div class="card" style="border-radius: 12px; border: none;
                                     box-shadow: 0 4px 15px rgba(0,0,0,0.1);">
                <div class="card-body">

                    <h5 style="color: #2c3e50; font-weight: bold;">
                        <i class="fas fa-money-bill-wave"
                           style="color: #2ecc71;"></i>
                        My Salary Slips
                    </h5>
                    <hr>

                    <table class="table table-bordered">
                        <thead>
                        <tr style="background-color: #2c3e50;
                                       color: white;">
                            <th>S.No</th>
                            <th>Month</th>
                            <th>Year</th>
                            <th>Basic</th>
                            <th>Gross</th>
                            <th>Deductions</th>
                            <th>Net Salary</th>
                            <th>Status</th>
                            <th>Action</th>
                        </tr>
                        </thead>
                        <tbody>
                        <tr th:each="p, i : ${myPayrolls}">
                            <td th:text="${i.count}"></td>
                            <td th:text="${p.month}"></td>
                            <td th:text="${p.year}"></td>
                            <td th:text="'₹' + ${p.basicSalary}"></td>
                            <td th:text="'₹' + ${p.grossSalary}"></td>
                            <td th:text="'₹' + ${p.totalDeduction}"></td>
                            <td style="font-weight: bold; color: #2ecc71;"
                                th:text="'₹' + ${p.netSalary}">
                            </td>
                            <td>
                                    <span th:if="${p.status == 'GENERATED'}"
                                          style="background-color: #f6c23e;
                                                 color: white; padding: 4px 10px;
                                                 border-radius: 20px;
                                                 font-size: 12px;">
                                        Generated
                                    </span>
                                <span th:if="${p.status == 'PAID'}"
                                      style="background-color: #2ecc71;
                                                 color: white; padding: 4px 10px;
                                                 border-radius: 20px;
                                                 font-size: 12px;">
                                        Paid ✅
                                    </span>
                            </td>
                            <td>
                                <a th:href="@{/user-salary-slip(id=${p.id})}"
                                   style="background-color: #3498db;
                                              color: white; padding: 5px 10px;
                                              border-radius: 6px;
                                              text-decoration: none;
                                              font-size: 12px;">
                                    <i class="fas fa-eye"></i> View
                                </a>
                            </td>
                        </tr>
                        <tr th:if="${#lists.isEmpty(myPayrolls)}">
                            <td colspan="9"
                                class="text-center text-muted">
                                No Salary Slips Generated Yet
                            </td>
                        </tr>
                        </tbody>
                    </table>

                </div>
            </div>
        </div>
    </div>
</section>
</body>
</html>
